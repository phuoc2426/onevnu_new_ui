name: students
description: A new Flutter project.


# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

#version: 1.1.0+1038
version: 2.0.7+1049

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
#  flutter_app_badger: ^1.5.1
  app_badge_plus: ^1.2.5

  flutter:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  # flutter_svg: ^1.1.4

  inmapz:
    path: ./inmapz

  vnu_core:
    path: '../vnu_core'

  vnu_noi_tru:
    path: '../vnu_noi_tru'

  vnu_hoc_bong:
    path: '../vnu_hoc_bong'
  device_preview: ^1.2.0
  # flutter_i18n: ^0.32.4
  # webview_flutter: ^3.0.4
  # flutter_bloc: ^8.1.1

  # connectivity: ^3.0.6

  # flutter_secure_storage: ^5.0.2

  flutter_hooks: ^0.21.3+1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  firebase_remote_config: ^6.5.1
  flutter_smart_dialog: ^5.1.0
  barcode_widget: ^2.0.4
  salomon_bottom_bar: ^3.3.2
  shadcn_ui: ^0.54.0
  file_picker: ^11.0.2
  timezone: ^0.11.0
  page_flip: ^0.2.5+1
  flutter_email_sender: ^6.0.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  app_links: ^6.3.0
#  liquid_glass_easy: ^1.1.1
#  glass: ^2.0.0
  # #API
  # retrofit: ^3.0.1+1
  # event_bus: ^2.0.0
dependency_overrides:
  sqflite: 2.3.3+1
  google_maps_flutter_android: 2.18.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: any
  
  # retrofit_generator: any
  # build_runner: any
  # json_serializable: ^6.1.5

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  # NOTE command run:   flutter pub run flutter_launcher_icons:main
  # web:
  #   generate: true
  #   image_path: "path/to/image.png"
  #   background_color: "#hexcode"
  #   theme_color: "#hexcode"
  # windows:
  #   generate: true
  #   image_path: "path/to/image.png"
  #   icon_size: 48 # min:48, max:256, default: 48


# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf

        - asset: assets/fonts/OpenSans-Italic.ttf
          style: italic

        - asset: assets/fonts/OpenSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/OpenSans-ExtraBoldItalic.ttf
          weight: 800
          style: italic

        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-BoldItalic.ttf
          weight: 700
          style: italic

        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSans-SemiBoldItalic.ttf
          weight: 600
          style: italic

        - asset: assets/fonts/OpenSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/OpenSans-MediumItalic.ttf
          weight: 500
          style: italic

        - asset: assets/fonts/OpenSans-Light.ttf
          weight: 300
        - asset: assets/fonts/OpenSans-LightItalic.ttf
          weight: 300
          style: italic

